<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{projectName} — Apresentação</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
        font-family: "Inter", sans-serif;
      }

      #stage {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 1280px;
        height: 720px;
        transform-origin: center center;
      }

      #stage iframe {
        width: 1280px;
        height: 720px;
        border: none;
        display: block;
        pointer-events: none;
      }

      #counter {
        position: fixed;
        bottom: 16px;
        right: 24px;
        color: rgba(255, 255, 255, 0.55);
        font:
          500 14px/1 "Inter",
          system-ui,
          sans-serif;
        letter-spacing: 0.04em;
        user-select: none;
        z-index: 100;
      }

      #progress {
        position: fixed;
        bottom: 0;
        left: 0;
        height: 3px;
        background: #0ea5e9;
        transition: width 0.3s ease;
        z-index: 100;
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <iframe id="slide" src="1.html" allowfullscreen></iframe>
    </div>

    <div id="counter">1 / 16</div>
    <div id="progress" style="width: 6.25%"></div>

    <script>
      (function () {
        const TOTAL = 16;
        let current = 1;

        const iframe = document.getElementById("slide");
        const counter = document.getElementById("counter");
        const progress = document.getElementById("progress");
        const stage = document.getElementById("stage");

        function go(n) {
          n = Math.max(1, Math.min(TOTAL, n));
          if (n === current) return;
          current = n;
          iframe.src = current + ".html";
          counter.textContent = current + " / " + TOTAL;
          progress.style.width = ((current / TOTAL) * 100).toFixed(2) + "%";
        }

        function next() {
          go(current + 1);
        }
        function prev() {
          go(current - 1);
        }

        document.addEventListener("keydown", function (e) {
          switch (e.key) {
            case "ArrowRight":
            case "ArrowDown":
            case "PageDown":
            case " ":
            case "Enter":
              e.preventDefault();
              next();
              break;

            case "ArrowLeft":
            case "ArrowUp":
            case "PageUp":
            case "Backspace":
              e.preventDefault();
              prev();
              break;

            case "Home":
              e.preventDefault();
              go(1);
              break;
            case "End":
              e.preventDefault();
              go(TOTAL);
              break;

            case "f":
            case "F":
              e.preventDefault();
              if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
              } else {
                document.exitFullscreen();
              }
              break;
          }
        });

        /* ---------- click to navigate ---------- */
        stage.addEventListener("click", function (e) {
          var rect = stage.getBoundingClientRect();
          var x = e.clientX - rect.left;
          if (x < rect.width / 2) {
            prev();
          } else {
            next();
          }
        });

        /* ---------- scale iframe to fit viewport ---------- */
        function resize() {
          var vw = window.innerWidth,
            vh = window.innerHeight;
          var scale = Math.min(vw / 1280, vh / 720);
          stage.style.transform =
            "translate(-50%,-50%) scale(" + scale.toFixed(4) + ")";
        }

        window.addEventListener("resize", resize);
        resize();
      })();
    </script>
  </body>
</html>
